name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (untuk identifikasi)'
        required: true
      browser_url:
        description: 'URL download ZIP project dari release'
        required: true
      build_type:
        description: 'debug atau release'
        required: false
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'          # selalu ambil Flutter stable terbaru → Dart SDK ikut terbaru
          cache: true

      - name: Download & extract project ZIP
        run: |
          set -e
          curl -L -f -o project.zip "${{ inputs.browser_url }}"
          mkdir -p project_raw
          unzip -q project.zip -d project_raw

          # ZIP kadang punya 1 folder pembungkus (mis. myapp-main/), jadi cari
          # folder yang benar-benar berisi pubspec.yaml, bukan asumsi root.
          PUBSPEC_PATH=$(find project_raw -maxdepth 4 -name pubspec.yaml | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "::error::pubspec.yaml tidak ditemukan di dalam ZIP. Pastikan ZIP berisi project Flutter yang valid."
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project ditemukan di: $PROJECT_DIR"

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}-${{ inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          
